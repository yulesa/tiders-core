name: Release

on:
  push:
    tags:
      - v*

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y capnproto libcapnp-dev
      - name: Publish tiders-evm-schema
        run: cargo publish -p tiders-evm-schema || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-svm-schema
        run: sleep 10 && cargo publish -p tiders-svm-schema || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-cast
        run: sleep 10 && cargo publish -p tiders-cast || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-query
        run: sleep 10 && cargo publish -p tiders-query || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-evm-decode
        run: sleep 10 && cargo publish -p tiders-evm-decode || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-svm-decode
        run: sleep 10 && cargo publish -p tiders-svm-decode || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-ingest
        run: sleep 10 && cargo publish -p tiders-ingest || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-core
        run: sleep 10 && cargo publish -p tiders-core || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-python:
    runs-on: ubuntu-latest
    needs: [publish-crates]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y capnproto libcapnp-dev
      - name: Install maturin and twine
        run: pip install maturin twine
      - name: Build wheel
        run: maturin build --release --manifest-path ./python/Cargo.toml
      - name: Publish to PyPI
        run: twine upload target/wheels/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
