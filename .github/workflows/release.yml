name: Release

on:
  push:
    tags:
      - v*

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y capnproto libcapnp-dev
      - name: Publish tiders-evm-schema
        run: cargo publish -p tiders-evm-schema || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-svm-schema
        run: sleep 10 && cargo publish -p tiders-svm-schema || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-cast
        run: sleep 10 && cargo publish -p tiders-cast || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-query
        run: sleep 10 && cargo publish -p tiders-query || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-evm-decode
        run: sleep 10 && cargo publish -p tiders-evm-decode || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-svm-decode
        run: sleep 10 && cargo publish -p tiders-svm-decode || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-ingest
        run: sleep 10 && cargo publish -p tiders-ingest || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish tiders-core
        run: sleep 10 && cargo publish -p tiders-core || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-python-linux:
    runs-on: ${{ matrix.platform.runner }}
    needs: [publish-crates]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
            python-architecture: x64
          - runner: ubuntu-latest
            target: aarch64
            python-architecture: arm64
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.platform.python-architecture }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          OPENSSL_STATIC: "1"
          OPENSSL_NO_VENDOR: "0"
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter python${{ matrix.python-version }} --zig --manifest-path ./python/Cargo.toml
          manylinux: auto
          before-script-linux: |
            sudo apt-get install -y capnproto libcapnp-dev libssl-dev pkg-config
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}-python${{ matrix.python-version }}
          path: dist

  publish-python-macos:
    runs-on: ${{ matrix.platform.runner }}
    needs: [publish-crates]
    strategy:
      matrix:
        platform:
          - runner: macos-14
            target: aarch64
            python-architecture: arm64
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.platform.python-architecture }}
      - name: capnproto
        run: brew install capnp
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter python${{ matrix.python-version }} --manifest-path ./python/Cargo.toml
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}-python${{ matrix.python-version }}
          path: dist

  publish-python-sdist:
    runs-on: ubuntu-latest
    needs: [publish-crates]
    steps:
      - uses: actions/checkout@v5
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path ./python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  upload-pypi:
    runs-on: ubuntu-latest
    needs: [publish-python-linux, publish-python-macos, publish-python-sdist]
    steps:
      - uses: actions/download-artifact@v4
      - name: Install twine
        run: pip install twine
      - name: Publish to PyPI
        run: twine upload --skip-existing wheels-*/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
